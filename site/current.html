<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Current Week Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }
      .subtitle {
        color: #94a3b8;
        margin-bottom: 32px;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
      }
      .card {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        padding: 16px;
      }
      .card-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #94a3b8;
        margin-bottom: 8px;
      }
      .card-value {
        font-size: 22px;
        font-weight: 600;
      }
      .section {
        margin-top: 24px;
      }
      .section h2 {
        font-size: 20px;
        margin-bottom: 12px;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .list-item {
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.16);
      }
      .muted {
        color: #94a3b8;
      }
      a {
        color: #7dd3fc;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Current Week</h1>
      <div class="subtitle" id="weekRange">Loading…</div>

      <div class="cards" id="summaryCards"></div>

      <div class="section">
        <h2>By Activity Type</h2>
        <div class="list" id="typeBreakdown"></div>
      </div>

      <div class="section">
        <h2>Activities This Week</h2>
        <div class="list" id="activityList"></div>
      </div>
    </div>

    <script src="current.js"></script>
  </body>
</html>
